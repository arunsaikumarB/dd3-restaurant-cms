[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # GA4 SDK uses gRPC/protobuf dynamic requires that don't survive esbuild
  # bundling — ship it from node_modules instead. nodemailer is included as
  # a precaution for the same class of dynamic-require issue.
  external_node_modules = ["@google-analytics/data", "pdf-parse", "mammoth", "nodemailer"]

# GA4 service-account credentials — server only (Netlify functions).
# GA4_PROPERTY_ID, GA4_CLIENT_EMAIL, GA4_PRIVATE_KEY
# (Site configuration → Environment variables). Never expose to the browser.

# SERPER_API_KEY — server only (Netlify functions). Used by
# netlify/functions/google-reviews-sync.mts (runs weekly, Mondays 8am UTC)
# to sync 5-star Google reviews with text, per location, into Supabase
# google_reviews. Free Serper.dev plan: 100 searches/month.

# VITE_SITE_URL, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY — set in Netlify UI
# SUPABASE_SERVICE_ROLE_KEY — server only (Netlify functions + CLI sync; never expose to browser)
# SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD — server only (contact/catering
# enquiry email notifications, via netlify/functions/submit-enquiry.mts + nodemailer)
# SMTP_FROM — the "from" address (defaults to SMTP_USER if unset)
# ENQUIRY_NOTIFY_EMAIL — TEMPORARY shared test inbox for all 6 enquiry forms
# (3 locations x contact/catering). See src/config/enquiryRecipients.ts to
# swap in each form's real recipient when ready.
# (Site configuration → Environment variables → Production / Deploy previews)

# netlify/edge-functions/seo-head.ts — server-injects per-page SEO tags (title,
# meta description, focus keyword, OG, canonical, robots) into the HTML before
# it's served, so they're visible in View Source / to non-JS crawlers (social
# share scrapers), not just to browsers running PageSEO.tsx's client JS.
# Declares its own path/excludedPath via `export const config` in the file —
# no [[edge_functions]] block needed here. Requires VITE_SUPABASE_URL and
# VITE_SUPABASE_ANON_KEY to be readable in the Edge Functions scope (Netlify UI
# → Environment variables — same vars already used by the Vite build).

# SPA fallback — required for React Router (main site + /admin/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets from Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML shell — always revalidate (SPA)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SEO files — short cache so demo URL changes propagate after redeploy
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
